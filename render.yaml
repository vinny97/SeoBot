services:
  - type: web
    name: northstar-seo
    runtime: node
    buildCommand: npm ci && npm run build && npm run build:worker
    startCommand: npm run start:production
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
      - key: COMPOSIO_SHOPIFY_AUTH_CONFIG_ID
        sync: false
      - key: COMPOSIO_WIX_AUTH_CONFIG_ID
        sync: false
      - key: COMPOSIO_GSC_AUTH_CONFIG_ID
        value: ac_2d-b3WRSIFhr
      - key: COMPOSIO_GOOGLE_ANALYTICS_AUTH_CONFIG_ID
        sync: false
      - key: MONID_API_KEY
        sync: false
      - key: INTEGRATION_ENCRYPTION_KEY
        sync: false
      - key: INTEGRATION_ENCRYPTION_KEY_PREVIOUS
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_DEMO_MODE
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.6
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: CRAWLER_USER_AGENT
        value: NorthstarCrawler/0.1
      - key: CRAWLER_CONTACT_URL
        sync: false
      - key: CRAWLER_MAX_PAGES
        value: "50"
      - key: CRAWLER_MAX_DEPTH
        value: "4"
      - key: CRAWLER_FULL_SITE_MAX_PAGES
        value: "50000"
      - key: CRAWLER_FULL_SITE_MAX_DEPTH
        value: "20"
      - key: CRAWLER_CONCURRENCY
        value: "2"
      - key: CRAWLER_REQUEST_DELAY_MS
        value: "750"
      - key: CRAWLER_REQUEST_TIMEOUT_MS
        value: "15000"
      - key: CRAWLER_MAX_HTML_BYTES
        value: "5000000"
      - key: CRAWLER_MAX_SITEMAP_BYTES
        value: "10000000"
      - key: CRAWLER_MAX_REDIRECTS
        value: "5"
      - key: CRAWLER_WORKER_POLL_MS
        value: "3000"
      - key: CRAWLER_JOB_LOCK_MINUTES
        value: "5"
      - key: CRAWLER_MAX_DURATION_MS
        value: "900000"
      - key: CRAWLER_FULL_SITE_MAX_DURATION_MS
        value: "21600000"
